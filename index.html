<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid Flowchart Preview</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 48px;
      padding: 0 20px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }

    header h1 {
      font-family: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.374px;
      color: #ffffff;
    }

    .badge {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: -0.12px;
      background: rgba(255, 255, 255, 0.12);
      padding: 2px 10px;
      border-radius: 980px;
      color: rgba(255, 255, 255, 0.72);
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editor-pane {
      display: flex;
      flex-direction: column;
      width: 40%;
      min-width: 280px;
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      background: #f5f5f7;
    }

    .pane-label {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: -0.12px;
      color: rgba(0, 0, 0, 0.48);
      padding: 8px 16px;
      background: #ffffff;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    textarea {
      flex: 1;
      resize: none;
      background: #f5f5f7;
      color: #1d1d1f;
      border: none;
      outline: none;
      padding: 16px;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      line-height: 1.6;
      tab-size: 2;
    }

    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-toolbar {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: -0.12px;
      color: rgba(0, 0, 0, 0.48);
      padding: 0 16px;
      height: 36px;
      background: #ffffff;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .btn {
      background: #0071e3;
      border: none;
      color: #ffffff;
      padding: 5px 14px;
      border-radius: 8px;
      font-family: "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: -0.224px;
      cursor: pointer;
      transition: filter 0.15s;
    }

    .btn:hover { filter: brightness(1.1); }
    .btn:active { filter: brightness(0.92); }

    .btn-secondary {
      background: #1d1d1f;
    }

    #preview-container {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f5f5f7;
      cursor: grab;
    }

    #preview-container:active {
      cursor: grabbing;
    }

    #diagram {
      max-width: 100%;
      filter: drop-shadow(rgba(0, 0, 0, 0.12) 0px 4px 24px);
    }

    #diagram svg {
      max-width: 100%;
      height: auto;
    }

    /* Edge labels (YES / NO branch text) */
    #diagram .edgeLabel {
      background: #ffffff;
      border-radius: 4px;
      padding: 1px 4px;
    }

    #diagram .edgeLabel p {
      color: #1d1d1f !important;
      font-family: "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.12px;
    }

    #error-box {
      display: none;
      background: #ffffff;
      border-radius: 8px;
      padding: 16px 20px;
      color: #1d1d1f;
      font-family: "SF Pro Text", "Helvetica Neue", Helvetica, monospace;
      font-size: 13px;
      line-height: 1.47;
      letter-spacing: -0.224px;
      max-width: 600px;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: rgba(0, 0, 0, 0.22) 3px 5px 30px 0px;
    }

    #error-box::before {
      content: "Parse Error";
      display: block;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.224px;
      color: #ff3b30;
      margin-bottom: 8px;
    }

    .status {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: -0.12px;
      padding: 4px 16px 6px;
      color: rgba(0, 0, 0, 0.48);
      background: #ffffff;
    }

    .status.ok { color: #34c759; }
    .status.err { color: #ff3b30; }
  </style>
</head>
<body>

<header>
  <h1>Mermaid Preview</h1>
  <span class="badge">live</span>
</header>

<div class="main">
  <div class="editor-pane">
    <div class="pane-label">Editor</div>
    <textarea id="editor" spellcheck="false">flowchart TD
    A([Start]) --> B{Is it working?}
    B -- Yes --> C[Great!]
    B -- No --> D[Debug]
    D --> E[Fix the issue]
    E --> B
    C --> F([End])
</textarea>
    <div id="status" class="status ok">Ready</div>
  </div>

  <div class="preview-pane">
    <div class="preview-toolbar">
      <span>Preview</span>
      <button class="btn btn-secondary" id="reset-view-btn">Reset View</button>
      <button class="btn" id="copy-svg-btn">Copy SVG</button>
    </div>
    <div id="preview-container">
      <div id="diagram"></div>
      <div id="error-box"></div>
    </div>
  </div>
</div>

<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    securityLevel: 'loose',
    flowchart: {
      htmlLabels: true,
      useMaxWidth: false,
    },
    themeVariables: {
      primaryColor: '#0071e3',
      primaryTextColor: '#ffffff',
      primaryBorderColor: '#0071e3',
      secondaryColor: '#34c759',
      secondaryTextColor: '#ffffff',
      secondaryBorderColor: '#34c759',
      tertiaryColor: '#ff9f0a',
      tertiaryTextColor: '#ffffff',
      tertiaryBorderColor: '#ff9f0a',
      lineColor: '#1d1d1f',
      edgeLabelBackground: '#ffffff',
      background: '#ffffff',
      mainBkg: '#0071e3',
      nodeBorder: '#0071e3',
      clusterBkg: '#f5f5f7',
      clusterBorder: 'rgba(0,0,0,0.12)',
      titleColor: '#1d1d1f',
      nodeTextColor: '#ffffff',
      fillType0: '#0071e3',
      fillType1: '#ff3b30',
      fillType2: '#ff9f0a',
      fillType3: '#34c759',
      fillType4: '#5ac8fa',
      fillType5: '#af52de',
      fillType6: '#ff2d55',
      fillType7: '#30b0c7',
    },
  });

  const editor = document.getElementById('editor');
  const diagram = document.getElementById('diagram');
  const errorBox = document.getElementById('error-box');
  const status = document.getElementById('status');
  let debounceTimer;

  // Preprocess common copy-paste issues before handing to Mermaid
  function preprocess(code) {
    return code
      // Replace literal \n inside node labels with <br/>
      .replace(/(\["|"\[|[\["])([^\]"]*?)\\n([^\]"]*?)("]|\])/g, (_, open, before, after, close) =>
        `${open}${before}<br/>${after}${close}`
      )
      .replace(/\[([^\]]*?)\\n([^\]]*?)\]/g, (_, before, after) =>
        `[${before}<br/>${after}]`
      )
      // Auto-quote unquoted diamond {labels} containing parentheses to prevent
      // Mermaid from misreading ( as a stadium-node token
      .replace(/\{([^"{}]*\([^"{}]*)\}/g, (_, content) => `{"${content}"}`)
      // Auto-quote unquoted box [labels] containing parentheses for the same reason
      .replace(/(?<!\[)\[([^"[\]]*\([^"[\]]*)\](?!\])/g, (_, content) => `["${content}"]`);
  }

  async function render() {
    const code = preprocess(editor.value.trim());
    if (!code) return;

    try {
      diagram.removeAttribute('data-processed');
      const id = 'mermaid-' + Date.now();
      const { svg } = await mermaid.render(id, code);
      diagram.innerHTML = svg;
      diagram.style.display = 'block';
      scale = 1; tx = 0; ty = 0;
      diagram.style.transform = '';
      errorBox.style.display = 'none';
      errorBox.textContent = '';
      status.textContent = 'Rendered OK';
      status.className = 'status ok';
    } catch (err) {
      diagram.style.display = 'none';
      errorBox.style.display = 'block';
      errorBox.textContent = err.message || String(err);
      status.textContent = 'Parse error';
      status.className = 'status err';
    }
  }

  editor.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(render, 300);
  });

  document.getElementById('reset-view-btn').addEventListener('click', () => {
    scale = 1; tx = 0; ty = 0;
    diagram.style.transform = '';
  });

  document.getElementById('copy-svg-btn').addEventListener('click', () => {
    const svg = diagram.innerHTML;
    if (!svg) return;
    navigator.clipboard.writeText(svg).then(() => {
      const btn = document.getElementById('copy-svg-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy SVG', 1500);
    });
  });

  render();

  // Zoom + Pan
  let scale = 1;
  let tx = 0, ty = 0;
  const MIN_SCALE = 0.2;
  const MAX_SCALE = 30;
  const previewContainer = document.getElementById('preview-container');

  function applyTransform() {
    diagram.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    diagram.style.transformOrigin = 'center center';
  }

  // Zoom toward cursor position
  previewContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = previewContainer.getBoundingClientRect();
    const cx = e.clientX - rect.left - rect.width / 2;
    const cy = e.clientY - rect.top - rect.height / 2;
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta));
    const ratio = newScale / scale;
    tx = cx + ratio * (tx - cx);
    ty = cy + ratio * (ty - cy);
    scale = newScale;
    applyTransform();
  }, { passive: false });

  // Pan by dragging
  let dragging = false;
  let dragStart = { x: 0, y: 0 };

  previewContainer.addEventListener('pointerdown', (e) => {
    dragging = true;
    dragStart = { x: e.clientX - tx, y: e.clientY - ty };
    previewContainer.setPointerCapture(e.pointerId);
  });

  previewContainer.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    tx = e.clientX - dragStart.x;
    ty = e.clientY - dragStart.y;
    applyTransform();
  });

  previewContainer.addEventListener('pointerup', () => { dragging = false; });
  previewContainer.addEventListener('pointercancel', () => { dragging = false; });
</script>
</body>
</html>
