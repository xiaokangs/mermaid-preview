<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid Flowchart Preview</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f9fa;
      color: #202124;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #ffffff;
      border-bottom: 1px solid #dadce0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #4285F4;
    }

    .badge {
      font-size: 11px;
      background: #e8f0fe;
      padding: 2px 8px;
      border-radius: 999px;
      color: #1a73e8;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editor-pane {
      display: flex;
      flex-direction: column;
      width: 40%;
      min-width: 280px;
      border-right: 1px solid #dadce0;
    }

    .pane-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #80868b;
      padding: 8px 14px;
      background: #ffffff;
      border-bottom: 1px solid #dadce0;
    }

    textarea {
      flex: 1;
      resize: none;
      background: #f8f9fa;
      color: #202124;
      border: none;
      outline: none;
      padding: 16px;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      line-height: 1.6;
      tab-size: 2;
    }

    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-toolbar {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #80868b;
      padding: 8px 14px;
      background: #ffffff;
      border-bottom: 1px solid #dadce0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      background: #e8f0fe;
      border: none;
      color: #1a73e8;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      text-transform: none;
      letter-spacing: normal;
      transition: background 0.15s;
      font-weight: 500;
    }

    .btn:hover { background: #d2e3fc; }

    #preview-container {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #e8f0fe;
    }

    #diagram {
      max-width: 100%;
    }

    #diagram svg {
      max-width: 100%;
      height: auto;
    }

    #preview-container {
      cursor: grab;
    }

    #preview-container:active {
      cursor: grabbing;
    }

    #error-box {
      display: none;
      background: #fce8e6;
      border: 1px solid #f28b82;
      border-radius: 8px;
      padding: 14px 18px;
      color: #c5221f;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.5;
      max-width: 600px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status {
      font-size: 11px;
      padding: 0 14px 8px;
      color: #80868b;
      background: #ffffff;
    }

    .status.ok { color: #188038; }
    .status.err { color: #c5221f; }
  </style>
</head>
<body>

<header>
  <h1>Mermaid Preview</h1>
  <span class="badge">live</span>
</header>

<div class="main">
  <div class="editor-pane">
    <div class="pane-label">Editor</div>
    <textarea id="editor" spellcheck="false">flowchart TD
    A([Start]) --> B{Is it working?}
    B -- Yes --> C[Great!]
    B -- No --> D[Debug]
    D --> E[Fix the issue]
    E --> B
    C --> F([End])
</textarea>
    <div id="status" class="status ok">Ready</div>
  </div>

  <div class="preview-pane">
    <div class="preview-toolbar">
      <span>Preview</span>
      <button class="btn" id="copy-svg-btn">Copy SVG</button>
    </div>
    <div id="preview-container">
      <div id="diagram"></div>
      <div id="error-box"></div>
    </div>
  </div>
</div>

<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    securityLevel: 'loose',
    themeVariables: {
      primaryColor: '#4285F4',
      primaryTextColor: '#202124',
      primaryBorderColor: '#1a73e8',
      secondaryColor: '#34A853',
      secondaryTextColor: '#202124',
      secondaryBorderColor: '#188038',
      tertiaryColor: '#FBBC05',
      tertiaryTextColor: '#202124',
      tertiaryBorderColor: '#f29900',
      lineColor: '#5f6368',
      edgeLabelBackground: '#ffffff',
      background: '#ffffff',
      mainBkg: '#4285F4',
      nodeBorder: '#1a73e8',
      clusterBkg: '#e8f0fe',
      clusterBorder: '#4285F4',
      titleColor: '#202124',
      nodeTextColor: '#202124',
      fillType0: '#4285F4',
      fillType1: '#EA4335',
      fillType2: '#FBBC05',
      fillType3: '#34A853',
      fillType4: '#fa7b17',
      fillType5: '#f439a0',
      fillType6: '#a142f4',
      fillType7: '#24c1e0',
    },
  });

  const editor = document.getElementById('editor');
  const diagram = document.getElementById('diagram');
  const errorBox = document.getElementById('error-box');
  const status = document.getElementById('status');
  let debounceTimer;

  // Preprocess common copy-paste issues before handing to Mermaid
  function preprocess(code) {
    return code
      // Replace literal \n inside node labels with <br/>
      .replace(/(\["|"\[|[\["])([^\]"]*?)\\n([^\]"]*?)("]|\])/g, (_, open, before, after, close) =>
        `${open}${before}<br/>${after}${close}`
      )
      .replace(/\[([^\]]*?)\\n([^\]]*?)\]/g, (_, before, after) =>
        `[${before}<br/>${after}]`
      )
      // Auto-quote unquoted diamond {labels} containing parentheses to prevent
      // Mermaid from misreading ( as a stadium-node token
      .replace(/\{([^"{}]*\([^"{}]*)\}/g, (_, content) => `{"${content}"}`)
      // Auto-quote unquoted box [labels] containing parentheses for the same reason
      .replace(/(?<!\[)\[([^"[\]]*\([^"[\]]*)\](?!\])/g, (_, content) => `["${content}"]`);
  }

  async function render() {
    const code = preprocess(editor.value.trim());
    if (!code) return;

    try {
      diagram.removeAttribute('data-processed');
      const id = 'mermaid-' + Date.now();
      const { svg } = await mermaid.render(id, code);
      diagram.innerHTML = svg;
      diagram.style.display = 'block';
      scale = 1; tx = 0; ty = 0;
      diagram.style.transform = '';
      errorBox.style.display = 'none';
      errorBox.textContent = '';
      status.textContent = 'Rendered OK';
      status.className = 'status ok';
    } catch (err) {
      diagram.style.display = 'none';
      errorBox.style.display = 'block';
      errorBox.textContent = err.message || String(err);
      status.textContent = 'Parse error';
      status.className = 'status err';
    }
  }

  editor.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(render, 300);
  });

  document.getElementById('copy-svg-btn').addEventListener('click', () => {
    const svg = diagram.innerHTML;
    if (!svg) return;
    navigator.clipboard.writeText(svg).then(() => {
      const btn = document.getElementById('copy-svg-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy SVG', 1500);
    });
  });

  render();

  // Zoom + Pan
  let scale = 1;
  let tx = 0, ty = 0;
  const MIN_SCALE = 0.2;
  const MAX_SCALE = 30;
  const previewContainer = document.getElementById('preview-container');

  function applyTransform() {
    diagram.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    diagram.style.transformOrigin = 'center center';
  }

  // Zoom toward cursor position
  previewContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = previewContainer.getBoundingClientRect();
    const cx = e.clientX - rect.left - rect.width / 2;
    const cy = e.clientY - rect.top - rect.height / 2;
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale + delta));
    const ratio = newScale / scale;
    tx = cx + ratio * (tx - cx);
    ty = cy + ratio * (ty - cy);
    scale = newScale;
    applyTransform();
  }, { passive: false });

  // Pan by dragging
  let dragging = false;
  let dragStart = { x: 0, y: 0 };

  previewContainer.addEventListener('pointerdown', (e) => {
    dragging = true;
    dragStart = { x: e.clientX - tx, y: e.clientY - ty };
    previewContainer.setPointerCapture(e.pointerId);
  });

  previewContainer.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    tx = e.clientX - dragStart.x;
    ty = e.clientY - dragStart.y;
    applyTransform();
  });

  previewContainer.addEventListener('pointerup', () => { dragging = false; });
  previewContainer.addEventListener('pointercancel', () => { dragging = false; });
</script>
</body>
</html>
